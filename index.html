<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연결리스트 끝말잇기 센터</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        #game-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 600px; text-align: center; }
        h1 { color: #34495e; margin-bottom: 10px; }
        #status-msg { font-weight: bold; margin: 15px 0; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .input-group { margin: 20px 0; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 60%; font-size: 16px; outline: none; }
        input:focus { border-color: #3498db; }
        button { padding: 12px 25px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        
        /* 연결리스트(기차) 시각화 스타일 */
        #train-container { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 30px; gap: 10px; }
        .node { background: #2ecc71; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); position: relative; }
        .arrow { color: #95a5a6; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-card">
    <h1>🧩 끝말잇기 연결리스트</h1>
    <div id="status-msg" style="background-color: #e8f8f5; color: #2ecc71;">첫 단어는 '기차'입니다. 끝말을 이어보세요!</div>
    
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="다음 단어를 입력하세요" onkeypress="if(event.keyCode==13) addWord()">
        <button onclick="addWord()">연결하기</button>
    </div>

    <div id="train-container">
        <div class="node">기차</div>
    </div>
</div>

<script>
    // 1. 데이터 관리 (연결리스트 역할)
    let wordHistory = ["기차"];

    function addWord() {
        const input = document.getElementById('wordInput');
        const msgBox = document.getElementById('status-msg');
        const container = document.getElementById('train-container');
        const newWord = input.value.trim();

        // 검증 1: 두 글자 이상
        if (!newWord || newWord.length < 2) {
            updateMsg("⚠️ 두 글자 이상 입력해주세요!", "#fdf2e9", "#e67e22");
            return;
        }

        // 검증 2: 중복 확인
        if (wordHistory.includes(newWord)) {
            updateMsg(`🚫 '${newWord}'는 이미 사용한 단어입니다!`, "#fdedec", "#e74c3c");
            input.value = '';
            return;
        }

        // 검증 3: 끝말잇기 규칙 (연결리스트 데이터 검증)
        const lastWord = wordHistory[wordHistory.length - 1];
        if (lastWord[lastWord.length - 1] === newWord[0]) {
            wordHistory.push(newWord);
            updateMsg(`✅ '${newWord}' 연결 성공!`, "#e8f8f5", "#2ecc71");
            renderTrain();
        } else {
            updateMsg(`❌ 틀렸습니다! '${lastWord[lastWord.length - 1]}'로 시작해야 합니다.`, "#fdedec", "#e74c3c");
        }
        
        input.value = '';
        input.focus();
    }

    function updateMsg(text, bgColor, textColor) {
        const msgBox = document.getElementById('status-msg');
        msgBox.innerText = text;
        msgBox.style.backgroundColor = bgColor;
        msgBox.style.color = textColor;
    }

    function renderTrain() {
        const container = document.getElementById('train-container');
        container.innerHTML = ''; // 초기화
        
        wordHistory.forEach((word, index) => {
            const node = document.createElement('div');
            node.className = 'node';
            node.innerText = word;
            container.appendChild(node);

            if (index < wordHistory.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.innerText = '➡';
                container.appendChild(arrow);
            }
        });
    }
</script>

</body>
</html>
